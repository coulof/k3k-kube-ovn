# Lima VM template for k3k + Kube-OVN development
# Usage:
#   limactl create --name k3k-kube-ovn lima/k3k-kube-ovn.yaml
#   limactl start k3k-kube-ovn
#   limactl shell k3k-kube-ovn
#
# Rancher will be available at: https://rancher.k3k-kube-ovn.localhost
# (change the instance name above if you want a different hostname)

images:
  - location: "https://download.opensuse.org/distribution/leap/15.6/appliances/openSUSE-Leap-15.6-Minimal-VM.aarch64-Cloud.qcow2"
    arch: "aarch64"
  - location: "https://download.opensuse.org/distribution/leap/15.6/appliances/openSUSE-Leap-15.6-Minimal-VM.x86_64-Cloud.qcow2"
    arch: "x86_64"

cpus: 4
memory: "8GiB"
disk: "40GiB"

# Forward 80 and 443 from the guest to the Mac host on 127.0.0.1
# *.localhost resolves to 127.0.0.1 on macOS (RFC 6761)
portForwards:
  - guestPort: 443
    hostPort: 443
    hostIP: "127.0.0.1"
  - guestPort: 80
    hostPort: 80
    hostIP: "127.0.0.1"
  # Kubernetes API (optional, for direct kubectl access)
  - guestPort: 6443
    hostPort: 6443
    hostIP: "127.0.0.1"

provision:
  - mode: system
    script: |
      #!/bin/bash
      set -eux -o pipefail

      # Install RKE2
      if ! command -v rke2 &>/dev/null; then
        curl -sfL https://get.rke2.io | sh -
        systemctl enable rke2-server --now
      fi

      # Wait for RKE2 to be ready
      export KUBECONFIG=/etc/rancher/rke2/rke2.yaml
      export PATH=$PATH:/var/lib/rancher/rke2/bin
      until kubectl get nodes &>/dev/null; do sleep 5; done
      kubectl wait --for=condition=Ready node --all --timeout=300s

  - mode: system
    script: |
      #!/bin/bash
      set -eux -o pipefail

      export KUBECONFIG=/etc/rancher/rke2/rke2.yaml
      export PATH=$PATH:/var/lib/rancher/rke2/bin

      # Install Helm
      if ! command -v helm &>/dev/null; then
        curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
      fi

      # Install cert-manager
      if ! kubectl get ns cert-manager &>/dev/null; then
        kubectl apply -f https://github.com/cert-manager/cert-manager/releases/latest/download/cert-manager.yaml
        kubectl -n cert-manager wait --for=condition=Available deploy --all --timeout=300s
      fi

      # Install Rancher
      # The hostname uses the Lima instance name: rancher.<instance>.localhost
      if ! kubectl get ns cattle-system &>/dev/null; then
        helm repo add rancher-stable https://releases.rancher.com/server-charts/stable
        helm repo update
        helm install rancher rancher-stable/rancher \
          --namespace cattle-system --create-namespace \
          --set hostname=rancher.$(hostname -s).localhost \
          --set bootstrapPassword=admin \
          --set replicas=1
      fi

      # Install k3k
      if ! kubectl get ns k3k-system &>/dev/null; then
        helm repo add k3k https://rancher.github.io/k3k
        helm repo update
        helm install k3k k3k/k3k \
          --namespace k3k-system --create-namespace
      fi

  - mode: user
    script: |
      #!/bin/bash
      set -eux -o pipefail

      # Convenience: make kubectl available without sudo
      mkdir -p ~/.kube
      if [ ! -f ~/.kube/config ]; then
        sudo cp /etc/rancher/rke2/rke2.yaml ~/.kube/config
        sudo chown $(id -u):$(id -g) ~/.kube/config
        sed -i "s/127.0.0.1/$(hostname -I | awk '{print $1}')/g" ~/.kube/config
      fi

      # Add RKE2 bins to PATH
      grep -q 'rancher/rke2/bin' ~/.bashrc || \
        echo 'export PATH=$PATH:/var/lib/rancher/rke2/bin' >> ~/.bashrc

probes:
  - description: "RKE2 is ready"
    script: |
      #!/bin/bash
      set -eux -o pipefail
      if ! timeout 30s bash -c "until test -f /etc/rancher/rke2/rke2.yaml; do sleep 3; done"; then
        echo >&2 "rke2 is not ready yet"
        exit 1
      fi
    hint: |
      RKE2 is still starting up. Wait a few minutes and try again.
  - description: "kubectl works"
    script: |
      #!/bin/bash
      set -eux -o pipefail
      if ! timeout 30s bash -c "until /var/lib/rancher/rke2/bin/kubectl --kubeconfig /etc/rancher/rke2/rke2.yaml get nodes &>/dev/null; do sleep 3; done"; then
        echo >&2 "kubectl is not working yet"
        exit 1
      fi
    hint: |
      The Kubernetes API server is not responding. Check: sudo journalctl -u rke2-server
