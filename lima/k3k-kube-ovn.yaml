# Lima VM template for k3k + Kube-OVN development
# Usage:
#   limactl create --name k3k-kube-ovn lima/k3k-kube-ovn.yaml
#   limactl start k3k-kube-ovn
#   limactl shell k3k-kube-ovn
#


images:
  - location: https://download.opensuse.org/distribution/leap/15.6/appliances/openSUSE-Leap-15.6-Minimal-VM.x86_64-Cloud.qcow2
    arch: x86_64
  - location: https://download.opensuse.org/distribution/leap/15.6/appliances/openSUSE-Leap-15.6-Minimal-VM.aarch64-Cloud.qcow2
    arch: aarch64

cpus: 4
memory: "8GiB"
disk: "40GiB"

mountType: "reverse-sshfs"
mounts:
  - location: "~"
    writable: false

networks:
  - lima: user-v2
  - lima: user-v2-egress
  - lima: user-v2-node

# Forward Kubernetes API (optional, for direct kubectl access from Mac)
portForwards:
  - guestPort: 6443
    hostPort: 6443
    hostIP: "127.0.0.1"

provision:
  - mode: system
    script: |
      #!/bin/bash
      set -eux -o pipefail

      # Install sshfs to support reverse-sshfs host folder mounts if not present
      if ! command -v sshfs &>/dev/null; then
        echo "Installing sshfs..."
        zypper --non-interactive install -y sshfs
        echo "Restarting lima-guestagent to establish mounts..."
        systemctl restart lima-guestagent || true
      fi

      # Disable firewalld on SUSE/openSUSE to prevent CNI routing and port conflicts
      if systemctl is-enabled --quiet firewalld &>/dev/null || systemctl is-active --quiet firewalld &>/dev/null; then
        echo "Disabling firewalld..."
        systemctl disable --now firewalld || true
      fi

      # Ensure IP forwarding is enabled
      sysctl -w net.ipv4.ip_forward=1
      echo "net.ipv4.ip_forward = 1" > /etc/sysctl.d/90-rke2-ip-forward.conf

      # Bind secondary stable IP 192.168.106.2 to the interface in the 192.168.106.0/24 subnet (user-v2-node)
      NODE_IFACE=$(ip route | grep 192.168.106.0/24 | awk '{print $3}' || true)
      if [ -n "${NODE_IFACE}" ]; then
        echo "Binding stable IP 192.168.106.2/24 to ${NODE_IFACE}..."
        ip addr add 192.168.106.2/24 dev "${NODE_IFACE}" || true
      fi

      # Pre-configure RKE2 to set CNI to none (we will install Kube-OVN via Helm) and disable default ingress-nginx
      # We bind RKE2 to the dedicated stable node-ip of eth2 (192.168.106.2) on the user-v2-node network.
      mkdir -p /etc/rancher/rke2
      cat <<EOF > /etc/rancher/rke2/config.yaml
      cni: none
      node-ip: 192.168.106.2
      tls-san:
        - 192.168.106.2
        - k3k-kube-ovn.internal
      disable:
        - rke2-ingress-nginx
      EOF

      # Install RKE2
      if ! command -v rke2 &>/dev/null; then
        echo "Installing RKE2..."
        curl -sfL https://get.rke2.io | sh -
        systemctl enable rke2-server --now
      fi

      # Wait for RKE2 kubectl binary to be available
      echo "Waiting for RKE2 kubectl binary..."
      until [ -f /var/lib/rancher/rke2/bin/kubectl ]; do
        sleep 5
      done

      # Wait for RKE2 to be ready (API server responsive, though nodes will be NotReady initially without CNI)
      export KUBECONFIG=/etc/rancher/rke2/rke2.yaml
      export PATH=$PATH:/var/lib/rancher/rke2/bin
      
      echo "Waiting for Kubernetes API server..."
      until kubectl get nodes &>/dev/null; do
        sleep 5
      done

  - mode: system
    script: |
      #!/bin/bash
      set -eux -o pipefail

      export KUBECONFIG=/etc/rancher/rke2/rke2.yaml
      export PATH=$PATH:/var/lib/rancher/rke2/bin

      # 1. Load openvswitch kernel module on the host
      if ! lsmod | grep -q openvswitch; then
        echo "Loading openvswitch kernel module..."
        modprobe openvswitch
      fi
      echo "openvswitch" > /etc/modules-load.d/openvswitch.conf

      # 2. Install Helm
      if ! command -v helm &>/dev/null; then
        echo "Installing Helm..."
        curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
      fi

      # 3. Install k3kcli
      if ! command -v k3kcli &>/dev/null; then
        echo "Installing k3kcli..."
        ARCH=$(uname -m)
        case "${ARCH}" in
          x86_64) K3K_ARCH="linux-amd64" ;;
          aarch64) K3K_ARCH="linux-arm64" ;;
          *) K3K_ARCH="linux-amd64" ;;
        esac
        wget -qO k3kcli "https://github.com/rancher/k3k/releases/download/v1.1.0/k3kcli-${K3K_ARCH}"
        chmod +x k3kcli
        mv k3kcli /usr/local/bin/
      fi

      # Install stern (Log tailing utility for Kubernetes)
      if ! command -v stern &>/dev/null; then
        echo "Installing stern..."
        ARCH=$(uname -m)
        case "${ARCH}" in
          x86_64) STERN_ARCH="amd64" ;;
          aarch64) STERN_ARCH="arm64" ;;
          *) STERN_ARCH="arm64" ;;
        esac
        curl -fsSL "https://github.com/stern/stern/releases/download/v1.34.0/stern_1.34.0_linux_${STERN_ARCH}.tar.gz" -o stern.tar.gz
        tar xf stern.tar.gz stern
        chmod +x stern
        mv stern /usr/local/bin/
        rm -f stern.tar.gz
      fi

      # 3. Wait for at least one host node to register in the API server
      echo "Waiting for at least one RKE2 host node to register..."
      until [ -n "$(kubectl get nodes -o jsonpath='{.items[*].metadata.name}' 2>/dev/null)" ]; do
        sleep 5
      done

      # 4. Label RKE2 host node as Kube-OVN master
      echo "Labeling master node..."
      kubectl label node --all kube-ovn/role=master --overwrite

      # 5. Get master node IP dynamically
      MASTER_IP=$(kubectl get nodes -o jsonpath='{.items[0].status.addresses[?(@.type=="InternalIP")].address}')
      echo "Master IP detected: ${MASTER_IP}"

      # 5. Install Kube-OVN on the host RKE2 cluster
      if ! helm -n kube-system status kube-ovn &>/dev/null; then
        echo "Installing Kube-OVN via Helm..."
        helm repo add kubeovn https://kubeovn.github.io/kube-ovn/
        helm repo update
        helm install kube-ovn kubeovn/kube-ovn \
          --namespace kube-system \
          --set ipv4.POD_CIDR="10.42.0.0/16" \
          --set ipv4.POD_GATEWAY="10.42.0.1" \
          --set ipv4.SVC_CIDR="10.43.0.0/16" \
          --set ipv4.JOIN_CIDR="100.64.0.0/16" \
          --set MASTER_NODES="${MASTER_IP}"
      fi

      # 6. Wait for Kube-OVN components to be fully ready
      echo "Waiting for Kube-OVN components to be ready..."
      kubectl -n kube-system rollout status deployment/kube-ovn-controller --timeout=300s
      kubectl -n kube-system rollout status daemonset/kube-ovn-cni --timeout=300s
      kubectl -n kube-system rollout status daemonset/ovs-ovn --timeout=300s

      # 7. Now wait for nodes to transition to Ready (since CNI is active)
      echo "Waiting for nodes to be Ready..."
      kubectl wait --for=condition=Ready node --all --timeout=300s

      # 8. Install Multus CNI to support multi-NIC egress gateways
      echo "Installing Multus CNI..."
      kubectl apply -f https://raw.githubusercontent.com/k8snetworkplumbingwg/multus-cni/master/deployments/multus-daemonset.yml
      echo "Waiting for Multus CNI to be ready..."
      kubectl -n kube-system rollout status daemonset/kube-multus-ds --timeout=300s


      # Install cert-manager via RKE2 auto-deploy manifests
      if ! [ -f /var/lib/rancher/rke2/server/manifests/cert-manager.yaml ]; then
        echo "Downloading cert-manager manifest to RKE2 server manifests directory..."
        mkdir -p /var/lib/rancher/rke2/server/manifests
        curl -sSL https://github.com/cert-manager/cert-manager/releases/latest/download/cert-manager.yaml -o /var/lib/rancher/rke2/server/manifests/cert-manager.yaml
      fi

      echo "Waiting for cert-manager namespace and deployments to be available..."
      until kubectl get ns cert-manager &>/dev/null; do
        sleep 5
      done
      kubectl -n cert-manager wait --for=condition=Available deploy --all --timeout=300s

      # Locate the manifests folder dynamically from the mounted host directory, ignoring hidden paths (e.g., .lima)
      PROJECT_DIR=$(find /Users /home -maxdepth 6 -type d -not -path "*/.*" -name "k3k-kube-ovn" 2>/dev/null | head -n 1 || true)
      if [ -z "${PROJECT_DIR}" ]; then
        echo "ERROR: Could not locate k3k-kube-ovn project directory in mounted volumes." >&2
        exit 1
      fi

      echo "Found mounted project directory at: ${PROJECT_DIR}"
      MANIFESTS_DIR="${PROJECT_DIR}/manifests"
      mkdir -p /var/lib/rancher/rke2/server/manifests

      # 1. Copy the k3k HelmChart manifest
      if [ -f "${MANIFESTS_DIR}/k3k/k3k-helmchart.yaml" ]; then
        echo "Copying k3k HelmChart auto-deploy manifest from mount..."
        cp "${MANIFESTS_DIR}/k3k/k3k-helmchart.yaml" /var/lib/rancher/rke2/server/manifests/k3k-helmchart.yaml
      fi

      # 2. Copy the namespace manifest
      if [ -f "${MANIFESTS_DIR}/k3k/namespace.yaml" ]; then
        echo "Copying namespace manifest from mount..."
        cp "${MANIFESTS_DIR}/k3k/namespace.yaml" /var/lib/rancher/rke2/server/manifests/k3k-namespace.yaml
      fi

      # 3. Copy the subnet manifest
      if [ -f "${MANIFESTS_DIR}/kube-ovn/subnet.yaml" ]; then
        echo "Copying subnet manifest from mount..."
        cp "${MANIFESTS_DIR}/kube-ovn/subnet.yaml" /var/lib/rancher/rke2/server/manifests/k3k-subnet.yaml
      fi

      # 4. Copy the cluster manifest
      if [ -f "${MANIFESTS_DIR}/k3k/cluster.yaml" ]; then
        echo "Copying cluster manifest from mount..."
        cp "${MANIFESTS_DIR}/k3k/cluster.yaml" /var/lib/rancher/rke2/server/manifests/k3k-cluster.yaml
      fi

      # 5. Copy the rancher-agent-resolver manifest
      if [ -f "${MANIFESTS_DIR}/rancher/rancher-agent-resolver.yaml" ]; then
        echo "Copying rancher-agent-resolver manifest from mount..."
        cp "${MANIFESTS_DIR}/rancher/rancher-agent-resolver.yaml" /var/lib/rancher/rke2/server/manifests/rancher-agent-resolver.yaml
      fi


      echo "Sync of manifests from mount successfully completed."

      echo "Waiting for k3k namespace and deployments to be available..."
      until kubectl get ns k3k-system &>/dev/null; do
        sleep 5
      done
      kubectl -n k3k-system wait --for=condition=Available deploy --all --timeout=300s

      # Install and configure bash-completion (Best Practice: Static, system-wide generation)
      if ! rpm -q bash-completion &>/dev/null; then
        echo "Installing bash-completion..."
        zypper --non-interactive install -y bash-completion
      fi

      echo "Generating kubectl, helm and stern system-wide bash completions..."
      mkdir -p /usr/share/bash-completion/completions
      /var/lib/rancher/rke2/bin/kubectl completion bash > /usr/share/bash-completion/completions/kubectl
      /usr/local/bin/helm completion bash > /usr/share/bash-completion/completions/helm
      /usr/local/bin/stern --completion bash > /usr/share/bash-completion/completions/stern


  - mode: system
    script: |
      #!/bin/bash
      set -eux -o pipefail

      # Set system-wide kubeconfig and PATH for RKE2 to bypass host mounts conflicts
      chmod 644 /etc/rancher/rke2/rke2.yaml
      cat <<'EOF' > /etc/profile.d/rke2.sh
      export KUBECONFIG=/etc/rancher/rke2/rke2.yaml
      export PATH=$PATH:/var/lib/rancher/rke2/bin
      EOF
      chmod +x /etc/profile.d/rke2.sh

      # Fallback TERM if terminfo is missing (e.g., for Ghostty)
      sudo -H -u lima bash <<'EOF'
      set -eux -o pipefail
      if [ -w ~/.bashrc ]; then
        grep -q 'ghostty' ~/.bashrc || cat <<'BASHRC' >> ~/.bashrc
      if [[ "$TERM" == *"ghostty"* ]] && ! infocmp "$TERM" &>/dev/null; then
        export TERM=xterm-256color
      fi
      BASHRC
      fi
      EOF

  - mode: system
    script: |
      #!/bin/bash
      set -eux -o pipefail

      # Ensure socat and full terminfo are installed (required for loopback proxying and tmux terminal capabilities)
      if ! rpm -q socat terminfo &>/dev/null; then
        echo "Installing socat and terminfo..."
        zypper --non-interactive install -y socat terminfo || true
      fi

      # Set up a systemd service to dynamically synchronize the IP of 'lima-rancher-prime.internal'
      # to 'lima-rancher-prime.localhost' inside the VM's /etc/hosts AND set up a socat port forwarder
      # to bypass hardcoded .localhost loopback resolution constraints in modern clients.
      cat <<'EOF' > /usr/local/bin/rancher-hosts-sync.sh
      #!/bin/bash
      CURRENT_IP=""
      SOCAT_PID=""

      cleanup() {
        if [ -n "$SOCAT_PID" ]; then
          kill "$SOCAT_PID" 2>/dev/null || true
        fi
        exit 0
      }
      trap cleanup SIGTERM SIGINT

      while true; do
        # Try to resolve lima-rancher-prime.internal
        IP=$(getent hosts lima-rancher-prime.internal | awk '{print $1}')
        if [ -n "$IP" ]; then
          # 1. Update /etc/hosts
          if ! grep -q "$IP lima-rancher-prime.localhost" /etc/hosts; then
            echo "Updating /etc/hosts: mapping lima-rancher-prime.localhost to $IP"
            sed -i '/lima-rancher-prime.localhost/d' /etc/hosts
            echo "$IP lima-rancher-prime.localhost" >> /etc/hosts
          fi

          # 2. Update socat port forwarder
          if [ "$IP" != "$CURRENT_IP" ]; then
            echo "Detected IP change for Rancher: $CURRENT_IP -> $IP"
            if [ -n "$SOCAT_PID" ]; then
              kill "$SOCAT_PID" 2>/dev/null || true
            fi
            /usr/bin/socat TCP-LISTEN:443,fork,bind=127.0.0.1 TCP:$IP:443 &
            SOCAT_PID=$!
            CURRENT_IP=$IP
          fi
        fi
        sleep 10
      done
      EOF
      chmod +x /usr/local/bin/rancher-hosts-sync.sh

      cat <<'EOF' > /etc/systemd/system/rancher-hosts-sync.service
      [Unit]
      Description=Rancher Prime Hosts Dynamic Sync
      After=network.target

      [Service]
      Type=simple
      ExecStart=/usr/local/bin/rancher-hosts-sync.sh
      Restart=always
      RestartSec=10

      [Install]
      WantedBy=multi-user.target
      EOF

      systemctl daemon-reload
      systemctl enable --now rancher-hosts-sync.service




probes:
  - description: "RKE2 is ready"
    script: |
      #!/bin/bash
      set -eux -o pipefail
      if ! timeout 30s bash -c "until test -f /etc/rancher/rke2/rke2.yaml; do sleep 3; done"; then
        echo >&2 "rke2 is not ready yet"
        exit 1
      fi
    hint: |
      RKE2 is still starting up. Wait a few minutes and try again.
  - description: "kubectl works"
    script: |
      #!/bin/bash
      set -eux -o pipefail
      if ! timeout 30s bash -c "until sudo /var/lib/rancher/rke2/bin/kubectl --kubeconfig /etc/rancher/rke2/rke2.yaml get nodes &>/dev/null; do sleep 3; done"; then
        echo >&2 "kubectl is not working yet"
        exit 1
      fi
    hint: |
      The Kubernetes API server is not responding. Check: sudo journalctl -u rke2-server
