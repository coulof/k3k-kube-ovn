apiVersion: v1
kind: ServiceAccount
metadata:
  name: rancher-agent-resolver
  namespace: kube-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: rancher-agent-resolver
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "update", "patch"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: rancher-agent-resolver
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: rancher-agent-resolver
subjects:
  - kind: ServiceAccount
    name: rancher-agent-resolver
    namespace: kube-system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rancher-agent-resolver
  namespace: kube-system
  labels:
    app: rancher-agent-resolver
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rancher-agent-resolver
  template:
    metadata:
      labels:
        app: rancher-agent-resolver
    spec:
      serviceAccountName: rancher-agent-resolver
      containers:
        - name: resolver
          image: bitnami/kubectl:latest
          command:
            - /bin/sh
            - -c
            - |
              set -eu
              echo "Starting Rancher Agent Resolver Controller..."
              while true; do
                # 1. Resolve Rancher VM IP via DNS
                IP=""
                if getent hosts lima-rancher-prime.internal >/dev/null; then
                  IP=$(getent hosts lima-rancher-prime.internal | awk '{print $1}')
                elif nslookup lima-rancher-prime.internal >/dev/null; then
                  IP=$(nslookup lima-rancher-prime.internal | awk '/Address:[[:space:]]+[0-9]/ {print $2}' | head -n1)
                fi

                if [ -z "$IP" ]; then
                  echo "Warning: Unable to resolve lima-rancher-prime.internal. Retrying in 10s..."
                  sleep 10
                  continue
                fi

                # 2. Scan and patch cattle-cluster-agent deployments across all namespaces
                DEPLYS=$(kubectl get deployments -A -o jsonpath='{range .items[?(@.metadata.name=="cattle-cluster-agent")]}{.metadata.namespace}{"/"}{.metadata.name}{"\n"}{end}' 2>/dev/null || true)

                for DEP in $DEPLYS; do
                  [ -z "$DEP" ] && continue
                  NS=$(echo "$DEP" | cut -d'/' -f1)
                  NAME=$(echo "$DEP" | cut -d'/' -f2)

                  # 2a. Retrieve and patch associated cattle-credentials secret to point to port 8443
                  SECRET_NAME=$(kubectl get deployment -n "$NS" "$NAME" -o jsonpath='{.spec.template.spec.volumes[?(@.name=="cattle-credentials")].secret.secretName}' 2>/dev/null || true)
                  if [ -n "$SECRET_NAME" ]; then
                    CURRENT_URL=$(kubectl get secret -n "$NS" "$SECRET_NAME" -o jsonpath='{.data.url}' 2>/dev/null || true)
                    if [ "$CURRENT_URL" != "aHR0cHM6Ly9saW1hLXJhbmNoZXItcHJpbWUubG9jYWxob3N0Ojg0NDM=" ]; then
                      echo "Patching secret $NS/$SECRET_NAME: Redirecting connection URL to port 8443"
                      kubectl patch secret -n "$NS" "$SECRET_NAME" -p '{"data":{"url":"aHR0cHM6Ly9saW1hLXJhbmNoZXItcHJpbWUubG9jYWxob3N0Ojg0NDM="}}' || echo "Failed to patch secret $NS/$SECRET_NAME"
                    fi
                  fi

                  # 2b. Patch deployment with loopback-proxy sidecar if missing or outdated
                  CURRENT_CATTLE_SERVER=$(kubectl get deployment -n "$NS" "$NAME" -o jsonpath='{.spec.template.spec.containers[?(@.name=="cluster-register")].env[?(@.name=="CATTLE_SERVER")].value}' 2>/dev/null || true)
                  CURRENT_CONTAINERS=$(kubectl get deployment -n "$NS" "$NAME" -o jsonpath='{.spec.template.spec.containers}' 2>/dev/null || true)
                  if [ "$CURRENT_CATTLE_SERVER" != "https://lima-rancher-prime.localhost:8443" ] || \
                     ! echo "$CURRENT_CONTAINERS" | grep -q "rancher-agent-loopback-proxy" || \
                     ! echo "$CURRENT_CONTAINERS" | grep -q "$IP" || \
                     ! echo "$CURRENT_CONTAINERS" | grep -q "8443"; then
                    echo "Patching deployment $NS/$NAME: Injecting/updating loopback-proxy sidecar on port 8443 forwarding to $IP:443 and setting CATTLE_SERVER URL to port 8443"
                    kubectl patch deployment -n "$NS" "$NAME" -p "{\"spec\":{\"template\":{\"spec\":{\"containers\":[{\"name\":\"cluster-register\",\"env\":[{\"name\":\"CATTLE_SERVER\",\"value\":\"https://lima-rancher-prime.localhost:8443\"}]},{\"name\":\"rancher-agent-loopback-proxy\",\"image\":\"alpine/socat:latest\",\"command\":[\"socat\",\"TCP-LISTEN:8443,fork,bind=127.0.0.1\",\"TCP:$IP:443\"]}]}}}}" || echo "Failed to patch deployment $NS/$NAME"
                  fi
                done

                sleep 15
              done
